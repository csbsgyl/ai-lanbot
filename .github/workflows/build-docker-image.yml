name: Build Docker Image

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish-docker-image:
    runs-on: ubuntu-latest
    name: Build image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub when configured
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin
          else
            echo "Docker Hub credentials are not configured; GHCR image will still be published."
          fi

      - name: Generate tags
        id: tags
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}:${RELEASE_TAG}"
            if [ "$IS_PRERELEASE" != "true" ]; then
              echo "ghcr.io/${GITHUB_REPOSITORY}:latest"
            fi
            if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
              echo "${GITHUB_REPOSITORY}:${RELEASE_TAG}"
              if [ "$IS_PRERELEASE" != "true" ]; then
                echo "${GITHUB_REPOSITORY}:latest"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
